<!DOCTYPE html>
<!--
檔案位置：dressing-inventory/index.html
時間戳記：2026-06-17 22:40 UTC+8
用途：敷料庫存盤點領用系統外部 App 入口。

水庫法則：
- 本頁是外部 App，不是 skhpsv2 主體頁。
- 本頁只直接載入：
  1. skhpsv2/assets/css/skhps-loading.css
  2. skhpsv2/assets/js/app-entry.js
- 本頁不直接載入 runtime/config/backend/css/header/footer/entry-core。
- 本頁不直接載入 assets/js/app.js 或 assets/ajax/*.js。
- app.js 與 config.js 由 app.json -> entry.afterScripts 交給水庫載入。
- 正式 CSS 由 CSS Sheet runtime / cache / fallback 負責。
- loading 階段由唯一 skhps-loading.css 負責。
- SKHPS_ENTRY_VERSION 只是水庫前端資源 cache buster，不是業務版本。

注意：
- 本頁仍保留 dressing-inventory 業務畫面暫時樣式，後續應沉澱到 CSS Sheet。
- 本版只補 loading 階段 layout isolation，避免 app-shell / tabs 先佔位把水庫 loading 畫面往下推。
-->
<html
  lang="zh-Hant"
  class="skhps-loading skhps-css-loading skhps-shell-loading skhps-main-loading"
  data-loading-title="敷料庫存盤點領用系統"
  data-skhps-entry-scope="external-app"
  data-skhps-app-id="dressing-inventory"
  data-skhps-app-name="敷料庫存盤點領用系統"
  data-skhps-page-id="dressing-inventory"
  data-skhps-page-map-current="敷料庫存"
  data-skhps-loading-tasks="css-runtime,dressing-inventory"
  data-skhps-shell-ready="false"
  data-skhps-page-ready="false"
>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>敷料庫存盤點領用系統</title>

  <script>
    (function () {
      "use strict";

      var APP_MANIFEST_URL = "app.json";
      var host = String(location.hostname || "").toLowerCase();
      var params = new URLSearchParams(location.search || "");
      var runtime = String(params.get("skhpsRuntime") || params.get("runtime") || "").trim();
      var allowedRuntime = { "local-dev": true, dev: true, prod: true };

      function runtimeBaseUrl(value) {
        if (value === "local-dev") return window.location.origin + "/skhpsv2/";
        if (value === "dev") return "https://dev-skhps.jonaminz.com/";
        return "https://skhps.jonaminz.com/";
      }

      function currentRuntime() {
        if (allowedRuntime[runtime]) return runtime;
        if (host === "127.0.0.1" || host === "localhost" || host === "" || /^192\.168\./.test(host) || /^10\./.test(host) || /^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(host)) return "local-dev";
        if (host.indexOf("dev-") === 0 || host.indexOf("dev.") === 0 || host.indexOf("dev-skhps") >= 0) return "dev";
        return "prod";
      }

      function assetVersion(value) {
        if (value === "local-dev" || value === "dev") return String(Date.now());
        return window.SKHPS_ASSET_VERSION || "prod";
      }

      var resolvedRuntime = currentRuntime();

      window.SKHPS_ENTRY_VERSION = assetVersion(resolvedRuntime);
      window.SKHPS_ENTRY_BASE_URL = runtimeBaseUrl(resolvedRuntime);
      window.SKHPS_APP_MANIFEST_URL = APP_MANIFEST_URL;

      document.documentElement.setAttribute("data-skhps-runtime", resolvedRuntime);
      document.documentElement.setAttribute("data-skhps-entry-scope", "external-app");

      document.write(
        '<link rel="stylesheet" href="' +
        window.SKHPS_ENTRY_BASE_URL +
        'assets/css/skhps-loading.css?v=' +
        encodeURIComponent(window.SKHPS_ENTRY_VERSION) +
        '">'
      );

      document.write(
        '<script src="' +
        window.SKHPS_ENTRY_BASE_URL +
        'assets/js/app-entry.js?v=' +
        encodeURIComponent(window.SKHPS_ENTRY_VERSION) +
        '"><\/script>'
      );
    })();
  </script>

  <!-- TEMP INLINE CSS START: dressing-inventory page only.
       Future migration target: CSS Sheet / assets/css/page.css -->
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --line: #dbe5ef;
      --text: #162231;
      --muted: #64748b;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --danger: #b42318;
      --warn: #b7791f;
      --ok: #15803d;
      --info: #2563eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px 18px 88px;
    }

    .hero,
    .panel,
    .status-panel,
    .detail-panel,
    .log-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      padding: 24px;
      margin-bottom: 16px;
    }

    h1, h2, h3 { margin: 0; line-height: 1.2; }
    h1 { font-size: clamp(1.65rem, 3vw, 2.4rem); }
    h2 { font-size: 1.1rem; }
    h3 { font-size: 1rem; }
    p { margin: 8px 0 0; color: var(--muted); }

    .badge-row, .tab-row, .action-row, .summary-grid, .field-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #075985;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.warn { background: #fef3c7; color: #92400e; }
    .badge.ok { background: #dcfce7; color: #166534; }
    .badge.danger { background: #fee2e2; color: #991b1b; }
    .badge.neutral { background: #eef2ff; color: #3730a3; }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 5;
      margin-bottom: 16px;
      padding: 10px;
      background: rgba(244, 247, 251, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .tab-button,
    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-button[aria-selected="true"],
    .primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .sort-button {
      min-height: 0;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font: inherit;
      font-weight: 800;
      text-align: left;
    }

    .secondary { background: var(--panel-soft); }
    .danger-button { color: var(--danger); }
    button:hover { filter: brightness(0.98); }

    .layout {
      display: grid;
      gap: 16px;
    }

    .panel,
    .status-panel,
    .detail-panel,
    .log-panel {
      padding: 18px;
    }

    #summaryArea {
      padding: 12px;
    }

    .panel + .panel,
    .detail-panel + .log-panel {
      margin-top: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      font: inherit;
    }

    textarea { min-height: 72px; resize: vertical; }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 14px 0;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: 1 / -1; }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.93rem;
    }

    th { color: var(--muted); background: var(--panel-soft); font-size: 0.82rem; }
    tr.is-selected { background: #ecfeff; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metric {
      min-height: 54px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .metric strong { display: block; font-size: 1.25rem; }
    .metric span { color: var(--muted); font-size: 0.84rem; font-weight: 700; }

    .detail-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .detail-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 8px;
    }

    .detail-line span:first-child { color: var(--muted); }

    .batch-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .batch-row {
      display: grid;
      grid-template-columns: minmax(52px, 0.8fr) minmax(82px, 1.2fr) minmax(86px, 1fr);
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      min-width: 0;
    }

    .batch-main,
    .batch-sub {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .batch-main {
      font-weight: 800;
    }

    .batch-sub {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .batch-meta {
      display: grid;
      justify-items: end;
      gap: 4px;
      min-width: 0;
      text-align: right;
    }

    .inventory-detail-row td {
      padding: 0;
      background: #f8fbff;
    }

    .inventory-detail-panel {
      display: grid;
      gap: 14px;
      padding: 16px;
      border-left: 4px solid var(--primary);
      animation: inventorySlideDown 150ms ease-out;
    }

    .inventory-detail-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .inline-log-toggle {
      justify-self: start;
      min-height: 36px;
      padding: 6px 10px;
      background: var(--panel);
    }

    .inline-log-panel {
      display: grid;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    @keyframes inventorySlideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .empty, .success, .error {
      padding: 14px;
      border-radius: 8px;
      border: 1px dashed var(--line);
      background: var(--panel-soft);
      color: var(--muted);
    }

    .success { border-color: #86efac; background: #f0fdf4; color: #166534; }
    .error { border-color: #fecaca; background: #fef2f2; color: #991b1b; }

    .log-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
      margin-top: 12px;
      padding-right: 4px;
    }

    .log-item {
      border-left: 4px solid var(--info);
      background: var(--panel-soft);
      padding: 9px 10px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .log-item.success { border-color: var(--ok); }
    .log-item.warn { border-color: var(--warn); }
    .log-item.error { border-color: var(--danger); }

    .mobile-card-list { display: none; }

    @media (max-width: 980px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .toolbar, .field-grid { grid-template-columns: 1fr 1fr; }
      .span-2, .span-3 { grid-column: 1 / -1; }
    }

    @media (max-width: 680px) {
      .app-shell { padding: 16px 12px 96px; }
      .hero, .panel, .status-panel, .detail-panel, .log-panel { padding: 14px; }
      .toolbar, .field-grid, .summary-grid { grid-template-columns: 1fr; }
      .batch-row { grid-template-columns: 1fr; justify-items: stretch; }
      .batch-meta { justify-items: start; text-align: left; }
      .inventory-detail-panel { padding: 12px; }
      .tab-row { display: grid; grid-template-columns: 1fr 1fr; }
      .tab-button { padding-inline: 8px; }
      .desktop-table { display: none; }
      .mobile-card-list { display: grid; gap: 10px; }
      .item-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }
      .item-card + .item-card { margin-top: 0; }
      .item-card dl { display: grid; gap: 6px; margin: 10px 0 0; }
      .item-card div { display: flex; justify-content: space-between; gap: 10px; }
      .item-card dt { color: var(--muted); font-weight: 700; }
      .item-card dd { margin: 0; text-align: right; }
    }

    /*
      Loading layout isolation fix.
      目的：
      loading 階段讓外部頁面的 header / main / footer 完全不參與排版，
      避免 app-shell / tabs 留下空白高度，把水庫 loading 畫面往下推。

      注意：
      不要 display:none body / html，否則會連 skhps-loading.css 的 loading 畫面一起影響。
    */
    html.skhps-loading,
    html.skhps-loading body {
      min-height: 100vh !important;
      margin: 0 !important;
      overflow: hidden !important;
    }

    html.skhps-loading [data-skhps-header],
    html.skhps-loading [data-skhps-main],
    html.skhps-loading [data-skhps-footer] {
      display: none !important;
    }

    html.skhps-loading .app-shell,
    html.skhps-loading .tabs {
      display: none !important;
    }
  </style>
  <!-- TEMP INLINE CSS END -->
</head>

<body class="skhps-body">
  <header id="header" class="skhps-header" data-skhps-header></header>

  <main id="dressingInventoryApp" class="app-shell" data-skhps-main aria-live="polite">
    <section class="hero">
      <div>
        <h1>敷料庫存盤點領用系統</h1>
        <p>先建立庫存、盤點、入庫、領用流程骨架，資料庫串接後補。</p>
      </div>
    </section>

    <nav class="tabs" aria-label="主要工作模式">
      <div id="modeTabs" class="tab-row"></div>
    </nav>

    <section class="layout">
      <div>
        <section id="summaryArea" class="status-panel"></section>
        <section id="workspaceArea" class="panel"></section>
      </div>
    </section>
  </main>

  <footer id="footer" data-skhps-footer class="skhps-footer">Footer 載入中...</footer>
</body>
</html>
